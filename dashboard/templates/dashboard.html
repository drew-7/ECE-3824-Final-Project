<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Desk Security Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root { --bg: #0b0e14; --surface: #12161f; --border: #1e2533; --green: #00e5a0; --red: #ff4d6d; --blue: #4db8ff; --text: #d6dce8; --muted: #5a6278; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; padding: 2rem; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 40px 40px; }
  .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1.25rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; position: relative; }
  .card-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; }
  .status-text { font-size: 2rem; font-weight: 800; color: #fff; }
  .stat-number { font-size: 2.4rem; font-weight: 800; color: #fff; }
  table { width: 100%; border-collapse: collapse; font-family: 'Space Mono', monospace; font-size: 0.75rem; }
  tbody td { padding: 0.6rem 0.75rem; color: var(--text); border-bottom: 1px solid rgba(255,255,255,.04); }
  .tag { padding: 0.15rem 0.55rem; border-radius: 4px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }
  .tag-human { background: rgba(0,229,160,.12); color: var(--green); }
  .tag-motion { background: rgba(77,184,255,.12); color: var(--blue); }
</style>
</head>
<body>

<header style="margin-bottom: 2rem;"><h1>Desk <span>Security</span> Monitor</h1></header>

<div class="grid">
  <div class="card" style="grid-column: span 4;">
    <div class="card-label">Occupancy Status</div>
    <div class="status-text" id="statusText">—</div>
    <div id="statusLast" style="font-size: 0.7rem; color: var(--muted);">Fetching...</div>
  </div>

  <div class="card" style="grid-column: span 2;">
    <div class="card-label">Events / 24h</div>
    <div class="stat-number" style="color: var(--green);" id="total24h">—</div>
  </div>

  <div class="card" style="grid-column: span 2;">
    <div class="card-label">Last Detected</div>
    <div class="stat-number" style="color: var(--blue); font-size: 1.5rem;" id="lastLabel">—</div>
  </div>

  <div class="card" style="grid-column: span 4;">
    <div class="card-label">Live Feed</div>
    <img src="{{ url_for('video_feed') }}" width="100%" style="border-radius:6px; border:1px solid var(--border);">
  </div>

  <div class="card" style="grid-column: span 12;">
    <div class="card-label">Activity — Last 60 Seconds</div>
    <canvas id="activityChart"></canvas>
  </div>

  <div class="card" style="grid-column: span 12;">
    <div class="card-label">Security Log</div>
    <table>
      <thead><tr><th>#</th><th>Timestamp</th><th>Duration</th><th>Label</th></tr></thead>
      <tbody id="logBody"><tr><td colspan="4">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const ctx = document.getElementById('activityChart').getContext('2d');
const activityChart = new Chart(ctx, {
  type: 'line',
  data: { labels: [], datasets: [{ label: 'Focus (1=Human, 0=Distracted)', data: [], borderColor: '#00e5a0', fill: true, backgroundColor: 'rgba(0,229,160,0.1)' }] },
  options: { scales: { y: { min: -0.5, max: 1.5, ticks: { stepSize: 1 } } } }
});

async function fetchJSON(url) { try { const r = await fetch(url); return await r.json(); } catch(e) { return null; } }

async function refresh() {
  // Update Status & Totals
  const status = await fetchJSON('/api/status');
  if (status) {
    document.getElementById('statusText').textContent = status.label.toUpperCase();
    document.getElementById('statusLast').textContent = `Last event @ ${status.last_event}`;
    document.getElementById('lastLabel').textContent = status.label.toUpperCase();
  }
  
  const total = await fetchJSON('/api/total');
  if (total) document.getElementById('total24h').textContent = total.total_24h;

  // Update Chart
  const chartData = await fetchJSON('/api/hourly');
  if (chartData) {
    activityChart.data.labels = chartData.labels;
    activityChart.data.datasets[0].data = chartData.counts;
    activityChart.update();
  }

  // Update Log
  const logs = await fetchJSON('/api/log');
  const body = document.getElementById('logBody');
  if (logs) {
    body.innerHTML = logs.map((r, i) => `
      <tr><td>${i+1}</td><td>${r.time}</td><td>${r.duration}s</td>
      <td><span class="tag ${r.label === 'human' ? 'tag-human' : 'tag-motion'}">${r.label}</span></td></tr>
    `).join('');
  }
}

setInterval(refresh, 5000);
refresh();
</script>
</body>
</html>
